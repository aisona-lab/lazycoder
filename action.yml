name: lazycoder
description: >-
  Review a PR diff against the R1..R17 rubric with senior-level judgement —
  APPROVE / REQUEST_CHANGES / BLOCK, posted as a sticky PR comment.
branding:
  icon: eye
  color: purple

inputs:
  anthropic-api-key:
    description: Anthropic API key (missing key skips the review with a warning, never fails fork PRs)
    required: true
  model:
    description: Model override (ARGUS_MODEL)
    default: ""
  max-tokens:
    description: Max output tokens per rule call (ARGUS_MAX_TOKENS)
    default: ""
  fail-on:
    description: "Verdict that fails the check: block | request-changes | never"
    default: request-changes
  comment:
    description: Post/update a sticky PR comment with the report
    default: "true"
  version:
    description: lazycoder PyPI version to run (empty = latest)
    default: ""
  github-token:
    description: Token used for gh (diff + comments)
    default: ${{ github.token }}

outputs:
  verdict:
    description: APPROVE | REQUEST_CHANGES | BLOCK | ERROR | SKIPPED
    value: ${{ steps.review.outputs.verdict }}
  exit-code:
    description: Raw lazycoder exit code (0/1/2/3)
    value: ${{ steps.review.outputs.exit_code }}

runs:
  using: composite
  steps:
    - uses: astral-sh/setup-uv@v5

    - id: diff
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        GH_REPO: ${{ github.repository }}
      run: |
        pr="${{ github.event.pull_request.number }}"
        if [ -z "$pr" ]; then
          echo "::error::lazycoder action requires a pull_request event"
          exit 1
        fi
        gh pr diff "$pr" > "$RUNNER_TEMP/pr.diff"

    - id: review
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
      run: |
        if [ -z "$ANTHROPIC_API_KEY" ]; then
          echo "::warning::lazycoder skipped — ANTHROPIC_API_KEY not available (fork PR?)"
          echo "verdict=SKIPPED" >> "$GITHUB_OUTPUT"
          echo "exit_code=0" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        [ -n "${{ inputs.model }}" ] && export ARGUS_MODEL="${{ inputs.model }}"
        [ -n "${{ inputs.max-tokens }}" ] && export ARGUS_MAX_TOKENS="${{ inputs.max-tokens }}"
        if [ -n "${{ inputs.version }}" ]; then
          spec="lazycoder@${{ inputs.version }}"
        else
          spec="lazycoder@latest"
        fi
        set +e
        uvx "$spec" "$RUNNER_TEMP/pr.diff" \
          --json > "$RUNNER_TEMP/report.json" 2> "$RUNNER_TEMP/stderr.txt"
        code=$?
        set -e
        echo "exit_code=$code" >> "$GITHUB_OUTPUT"
        case $code in
          0) verdict=APPROVE ;;
          1) verdict=REQUEST_CHANGES ;;
          2) verdict=BLOCK ;;
          *) verdict=ERROR ;;
        esac
        echo "verdict=$verdict" >> "$GITHUB_OUTPUT"
        echo "lazycoder verdict: $verdict (exit $code)"

    - id: comment
      if: inputs.comment == 'true' && steps.review.outputs.verdict != 'SKIPPED'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        GH_REPO: ${{ github.repository }}
      run: |
        python3 "${{ github.action_path }}/scripts/render_comment.py" \
          "$RUNNER_TEMP/report.json" \
          "${{ steps.review.outputs.verdict }}" \
          "$RUNNER_TEMP/stderr.txt" > "$RUNNER_TEMP/comment.md" \
          || { echo "::warning::could not render comment"; exit 0; }
        pr="${{ github.event.pull_request.number }}"
        repo="${{ github.repository }}"
        id=$(gh api "repos/$repo/issues/$pr/comments" --paginate \
          --jq '[.[] | select(.body | startswith("<!-- lazycoder-report -->"))][0].id' \
          2>/dev/null || true)
        if [ -n "$id" ] && [ "$id" != "null" ]; then
          gh api -X PATCH "repos/$repo/issues/comments/$id" \
            -F body=@"$RUNNER_TEMP/comment.md" > /dev/null \
            || echo "::warning::could not update the lazycoder comment"
        else
          gh api "repos/$repo/issues/$pr/comments" \
            -F body=@"$RUNNER_TEMP/comment.md" > /dev/null \
            || echo "::warning::could not post the lazycoder comment (needs pull-requests: write)"
        fi

    - id: gate
      shell: bash
      run: |
        code="${{ steps.review.outputs.exit_code }}"
        if [ "$code" -ge 3 ]; then
          cat "$RUNNER_TEMP/stderr.txt" >&2 || true
          echo "::error::lazycoder operational error (exit $code)"
          exit 1
        fi
        case "${{ inputs.fail-on }}" in
          never) exit 0 ;;
          block) [ "$code" -ge 2 ] && exit 1 || exit 0 ;;
          *) [ "$code" -ge 1 ] && exit 1 || exit 0 ;;
        esac
